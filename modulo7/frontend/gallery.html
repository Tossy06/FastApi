<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/modulo7/frontend/css/gallery.css" rel="stylesheet">
</head>
<body>

    <div class="gallery-header">
        <h1>Galería</h1>
        <p>Tu colección de piezas, siempre a la vista</p>
    </div>

    <div class="container pb-5">

        <div class="glass-panel mb-4">
            <h2 class="h5 mb-3">Añadir pieza</h2>
            <form id="item-form" class="row g-3 align-items-end">
                <div class="col-12 col-md-5">
                    <label for="item-name" class="form-label">Nombre</label>
                    <input type="text" name="name" id="item-name" class="form-control" placeholder="Nombre de la pieza">
                </div>
                <div class="col-12 col-md-5">
                    <label for="item-description" class="form-label">Descripción</label>
                    <input type="text" name="description" id="item-description" class="form-control" placeholder="Describe la pieza">
                </div>
                <div class="col-12 col-md-2">
                    <button type="submit" id="create-item" class="btn btn-glass w-100">Agregar</button>
                </div>
            </form>
            <div id="create-result" class="mt-3"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center">
            <h2 class="h5 mb-0">Piezas en exhibición</h2>
            <button id="load-items" class="btn btn-glass-outline">Cargar galería</button>
        </div>

        <div id="items-container"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/modulo7/frontend/js/api.js"></script>
    <script src="/modulo7/frontend/js/create.js"></script>
</body>
</html>
