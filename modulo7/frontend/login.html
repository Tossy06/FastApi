<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/modulo7/frontend/css/login.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="container d-flex justify-content-center">
        <div class="glass-card">

            <h1>Bienvenido</h1>

            <ul class="nav nav-tabs glass-tabs mb-4" id="auth-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab-btn" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">
                        Iniciar sesión
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab-btn" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab">
                        Registrarse
                    </button>
                </li>
            </ul>

            <div class="tab-content">

                <!-- Login -->
                <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="login-email" placeholder="tucorreo@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
                        </div>
                        <div id="login-alert" class="alert d-none" role="alert"></div>
                        <button type="submit" class="btn btn-glass w-100">Entrar</button>
                    </form>
                </div>

                <!-- Registro -->
                <div class="tab-pane fade" id="register-pane" role="tabpanel">
                    <form id="register-form">
                        <div class="mb-3">
                            <label for="register-email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="register-email" placeholder="tucorreo@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="register-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="register-password" placeholder="••••••••" required>
                        </div>
                        <div class="mb-3">
                            <label for="register-password-confirm" class="form-label">Confirmar contraseña</label>
                            <input type="password" class="form-control" id="register-password-confirm" placeholder="••••••••" required>
                        </div>
                        <div id="register-alert" class="alert d-none" role="alert"></div>
                        <button type="submit" class="btn btn-glass w-100">Crear cuenta</button>
                    </form>
                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/modulo7/frontend/js/auth.js"></script>
</body>
</html>
